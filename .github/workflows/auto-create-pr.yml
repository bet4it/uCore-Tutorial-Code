name: Create Pull Requests
on:
  push:
    branches:
      - 'ch*'
jobs:
  create_pull_request:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository and fetch all branches
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Determine Branches
        id: branch_logic
        run: |
          SOURCE_BRANCH=${{ github.ref_name }}
          
          if [[ ! $SOURCE_BRANCH =~ ^ch[0-9]+$ ]]; then
            echo "Branch name '$SOURCE_BRANCH' does not match the 'ch<number>' pattern. Skipping."
            echo "create_pr=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          CURRENT_NUM=${SOURCE_BRANCH#ch}
          LAST_BRANCH_NUM=3
          
          if [ "$CURRENT_NUM" -ge "$LAST_BRANCH_NUM" ]; then
            echo "Push was to the last branch (ch$CURRENT_NUM) or beyond. No PR will be created."
            echo "create_pr=false" >> $GITHUB_OUTPUT
          else
            NEXT_NUM=$((CURRENT_NUM + 1))
            TARGET_BRANCH="ch$NEXT_NUM"
            
            echo "Source branch is $SOURCE_BRANCH"
            echo "Target branch is $TARGET_BRANCH"
            
            echo "create_pr=true" >> $GITHUB_OUTPUT
            echo "source_branch=$SOURCE_BRANCH" >> $GITHUB_OUTPUT
            echo "target_branch=$TARGET_BRANCH" >> $GITHUB_OUTPUT
          fi
      - name: Create Pull Request
        if: steps.branch_logic.outputs.create_pr == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SOURCE_BRANCH="${{ steps.branch_logic.outputs.source_branch }}"
          TARGET_BRANCH="${{ steps.branch_logic.outputs.target_branch }}"
          
          if ! git rev-parse --verify "origin/$TARGET_BRANCH" >/dev/null 2>&1; then
            echo "Target branch 'origin/$TARGET_BRANCH' does not exist. Cannot create PR."
            exit 1
          fi
          PR_TITLE="Sync: Merge changes from $SOURCE_BRANCH into $TARGET_BRANCH"
          PR_BODY="This PR was automatically created by a GitHub Action to sync recent updates from \`$SOURCE_BRANCH\`."
          
          EXISTING_PR=$(gh pr list --base "$TARGET_BRANCH" --head "$SOURCE_BRANCH" --json number -q '.[0].number')
          
          if [[ -n "$EXISTING_PR" ]]; then
            echo "A pull request from $SOURCE_BRANCH to $TARGET_BRANCH already exists: #$EXISTING_PR"
          else
            echo "Creating a new pull request from $SOURCE_BRANCH to $TARGET_BRANCH"
            gh pr create \
              --base "$TARGET_BRANCH" \
              --head "$SOURCE_BRANCH" \
              --title "$PR_TITLE" \
              --body "$PR_BODY"
          fi

